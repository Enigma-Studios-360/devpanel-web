<div class="dp-auth">
  <a routerLink="/" class="dp-auth__brand">
    <span class="dp-auth__logo"><i class="pi pi-bolt"></i></span>
    <span>DevPanel</span>
  </a>

  <section class="dp-auth__card">
    <header class="dp-auth__head">
      <h1>{{ 'auth.login.title' | t }}</h1>
      <p>{{ 'auth.login.subtitle' | t }}</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="dp-auth__form" novalidate>
      <label class="dp-auth__field">
        <span>{{ 'auth.login.email' | t }}</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@correo.com"
        />
      </label>

      <label class="dp-auth__field">
        <span>{{ 'auth.login.password' | t }}</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </label>

      @if (errorMsg()) {
        <div class="dp-auth__error">
          <i class="pi pi-exclamation-circle"></i>
          {{ errorMsg() }}
        </div>
      }

      <button
        type="submit"
        class="dp-auth__submit"
        [disabled]="submitting()"
      >
        @if (submitting()) {
          <span class="dp-auth__spinner"></span>
        }
        {{ 'auth.login.submit' | t }}
      </button>

      <p class="dp-auth__alt">
        {{ 'auth.login.noAccount' | t }}
        <a routerLink="/auth/register">{{ 'auth.login.createOne' | t }}</a>
      </p>
    </form>
  </section>
</div>
