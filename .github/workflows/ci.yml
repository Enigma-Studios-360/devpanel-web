name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch: # permite ejecución manual desde la pestaña Actions

jobs:
  build:
    name: Build (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Build de producción
        run: npm run build

  audit:
    name: Auditoría de dependencias (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: npm audit (dependencias de producción, nivel alto+)
        run: npm audit --omit=dev --audit-level=high
